*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f0e8;--bg2:#ebe6de;--bg3:#e0dbd3;--bg4:#d6d0c8;
  --text:#1a1612;--text2:#5a5347;--text3:#8a8175;
  --accent:#D97757;--accent2:#e6a97e;--accent-dim:rgba(217,119,87,0.08);
  --blue:#6A9BCC;--green:#788C5D;--red:#c75c5c;--yellow:#d4b85a;--purple:#C46686;
  --font-display:'Anthropic Serif','DM Serif Display',Georgia,serif;
  --font-body:'DM Sans','Segoe UI',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
html,body{height:100%;overflow:hidden;background:#f5f0e8;font-family:var(--font-body);color:var(--text);-webkit-font-smoothing:antialiased}
.deck{position:relative;width:100vw;height:100vh;overflow:hidden}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:72px 100px;opacity:0;visibility:hidden;transform:translateX(40px);transition:opacity 0.5s ease,transform 0.5s ease,visibility 0s 0.5s;overflow:hidden}
.slide.active{opacity:1;visibility:visible;transform:translateX(0);transition:opacity 0.5s ease,transform 0.5s ease,visibility 0s 0s}
.slide.prev{transform:translateX(-40px)}
.slide--light{background:#f5f0e8;color:var(--text)}
h1{font-family:var(--font-display);font-size:65px;line-height:1.12;font-weight:400;letter-spacing:-0.02em}
h2{font-family:var(--font-display);font-size:51px;line-height:1.18;font-weight:400;letter-spacing:-0.01em}
h3{font-family:var(--font-body);font-size:29px;font-weight:600;letter-spacing:-0.01em}
p,.body-text{font-size:26px;line-height:1.6;color:var(--text2)}
.label{font-family:var(--font-body);font-size:18px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent)}
.big-number{font-family:var(--font-display);font-size:89px;color:var(--accent);line-height:1}
.big-number-label{font-size:22px;color:var(--text3);margin-top:6px}
.card{background:rgba(0,0,0,0.03);border:1px solid rgba(0,0,0,0.08);border-radius:12px;padding:28px 32px}
.card--accent{border-left:3px solid var(--accent);background:var(--accent-dim)}
.card--red{border-left:3px solid var(--red);background:rgba(199,92,92,0.06)}
.card--purple{border-left:3px solid var(--purple);background:rgba(196,102,134,0.06)}
.card--green{border-left:3px solid var(--green);background:rgba(120,140,93,0.06)}
.term-panel{position:absolute;top:0;left:0;right:0;bottom:0;background:#1e1e1e;border-radius:12px;overflow:hidden;font-family:'SF Mono','Fira Code','Consolas',monospace;font-size:13px;color:#d4d4d4;line-height:1.6;z-index:1}
.term-header{display:flex;align-items:center;padding:10px 16px;background:#2d2d2d;position:relative}
.term-dots{display:flex;gap:6px}
.term-dots span{width:12px;height:12px;border-radius:50%;display:inline-block}
.term-title{position:absolute;left:50%;transform:translateX(-50%);font-size:12px;color:#888}
.term-body{padding:16px 20px}
.term-line{white-space:pre-wrap}
.term-prompt{color:var(--accent)}
.term-cmd{color:#fff;font-weight:600}
.term-bullet{color:#d4d4d4}
.term-indent{padding-left:24px}
.term-indent2{padding-left:32px;color:#888}
.term-table{width:100%;border-collapse:collapse;font-size:13px}
.term-table th{text-align:left;color:#888;font-weight:400;padding:4px 12px 4px 0;border-bottom:1px solid #333}
.term-table td{padding:6px 12px 6px 0;border-bottom:1px solid #2a2a2a}
.term-panel .anim-line{opacity:0;transform:translateY(4px);transition:opacity .3s,transform .3s}
.term-panel .anim-type{overflow:hidden;display:inline-block;white-space:nowrap;width:0;border-right:2px solid #fff;vertical-align:bottom}
.term-panel.animating .anim-type{animation:termType var(--type-dur,1.5s) steps(var(--type-steps,40)) forwards,termBlink .6s step-end infinite}
.term-panel.animating .anim-line.show{opacity:1;transform:translateY(0)}
@keyframes termType{from{width:0}to{width:var(--type-width,100%)}}
@keyframes termBlink{50%{border-color:transparent}}
.tag{display:inline-block;padding:4px 12px;border-radius:6px;font-size:18px;font-weight:600;letter-spacing:0.03em}
.tag--blue{background:rgba(106,155,204,0.2);color:var(--blue)}
.tag--green{background:rgba(120,140,93,0.2);color:var(--green)}
.tag--purple{background:rgba(196,102,134,0.15);color:var(--purple)}
.tag--accent{background:rgba(217,119,87,0.1);color:var(--accent)}
table{width:100%;border-collapse:collapse;font-size:22px}
th{text-align:left;padding:14px 18px;font-weight:600;font-size:19px;letter-spacing:0.04em;text-transform:uppercase;color:var(--text2);border-bottom:1px solid rgba(0,0,0,0.1)}
td{padding:14px 18px;border-bottom:1px solid rgba(0,0,0,0.06)}
.phase-badge{display:inline-flex;align-items:center;justify-content:center;width:52px;height:52px;border-radius:50%;font-weight:700;font-size:20px;color:#fff;flex-shrink:0}
.slide-footer{position:absolute;bottom:24px;left:100px;right:100px;display:flex;justify-content:space-between;align-items:center;font-family:var(--font-body);font-size:13px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:rgba(0,0,0,0.15);pointer-events:none}
[data-step]{opacity:0;transform:translateY(18px);transition:opacity 0.5s ease,transform 0.5s ease;pointer-events:none}
[data-step].visible{opacity:1;transform:translateY(0);pointer-events:auto}
div.insert-line[data-step]{opacity:0;max-height:0;overflow:hidden;transform:none;transition:max-height 1s ease,opacity 0.8s ease 0.4s}
div.insert-line[data-step].visible{opacity:1;max-height:200px;transform:none}
.slide.active [data-step="0"]{opacity:1;transform:translateY(0);pointer-events:auto}
.nav-bar{position:fixed;bottom:0;left:0;right:0;height:48px;background:rgba(15,15,15,0.95);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:space-between;padding:0 36px;z-index:100;border-top:1px solid rgba(255,255,255,0.05)}
.nav-bar .page-num{font-family:var(--font-mono);font-size:18px;color:#7a7468}
.progress-bar{position:fixed;top:0;left:0;height:3px;background:#D97757;z-index:101;transition:width 0.3s ease}
.nav-btn{background:none;border:1px solid rgba(255,255,255,0.15);color:#b8b0a2;padding:6px 18px;border-radius:6px;font-family:var(--font-body);font-size:18px;cursor:pointer;transition:all 0.2s}
.nav-btn:hover{border-color:var(--accent);color:var(--accent)}
:fullscreen .nav-bar{display:none}:-webkit-full-screen .nav-bar{display:none}
:fullscreen .progress-bar{display:none}:-webkit-full-screen .progress-bar{display:none}
.presenter-overlay{display:none;position:fixed;inset:0;z-index:200;background:#111;color:#ddd;font-family:var(--font-body);padding:24px;overflow-y:auto}
.presenter-overlay.open{display:grid;grid-template-columns:2fr 1fr;grid-template-rows:auto 1fr auto;gap:16px}
.presenter-header{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding-bottom:16px;border-bottom:1px solid #333}
.presenter-header h3{font-size:23px;color:var(--accent);font-weight:600}
.presenter-timer{font-family:var(--font-mono);font-size:41px;color:#fff;letter-spacing:0.05em}
.presenter-current{border:1px solid #333;border-radius:8px;overflow:hidden;background:#000;position:relative;aspect-ratio:16/9}
.presenter-current iframe{width:200%;height:200%;transform:scale(0.5);transform-origin:top left;border:none;pointer-events:none}
.presenter-right{display:flex;flex-direction:column;gap:16px;min-height:0;overflow:hidden}
.presenter-notes{flex:1;background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:20px;overflow-y:auto;min-height:0}
.presenter-notes h4{font-size:18px;text-transform:uppercase;letter-spacing:0.08em;color:#666;margin-bottom:12px}
.presenter-notes p{font-size:20px;line-height:1.6;color:#ccc}
.presenter-nav{grid-column:1;display:flex;align-items:center;justify-content:center;gap:16px;padding-top:16px;border-top:1px solid #333}
.presenter-nav .nav-btn{padding:10px 28px;font-size:20px}
.presenter-thumbs{flex-shrink:0;display:flex;align-items:flex-start}
.presenter-thumb{width:100%;border:1px solid #333;border-radius:8px;overflow:hidden;background:#000;position:relative;aspect-ratio:16/9;cursor:pointer;transition:border-color 0.2s}
.presenter-thumb:hover{border-color:#555}
.presenter-thumb-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.8);padding:6px 12px;font-size:13px;color:#888}
.presenter-slide-num{font-family:var(--font-mono);font-size:20px;color:#666}
.presenter-close{background:none;border:1px solid #444;color:#999;padding:6px 14px;border-radius:6px;font-size:18px;cursor:pointer;font-family:var(--font-body)}
.presenter-close:hover{border-color:var(--red);color:var(--red)}
.kbd{display:inline-block;padding:2px 7px;border:1px solid #444;border-radius:4px;font-family:var(--font-mono);font-size:17px;color:#888;background:#222;margin:0 2px}
.step-indicator{font-family:var(--font-mono);font-size:17px;color:#555}
@media(min-width:1920px){.slide{padding:96px 140px}h1{font-size:77px}h2{font-size:61px}p,.body-text{font-size:29px}.big-number{font-size:105px}.slide-footer{left:140px;right:140px}}
.index-overlay{display:none;position:fixed;inset:0;z-index:250;background:rgba(15,15,15,0.97);overflow-y:auto;padding:48px 60px}
.index-overlay.open{display:block}
.index-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px}
.index-header h2{font-family:var(--font-display);font-size:36px;color:#fff}
.index-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.index-card{background:#1a1a1a;border:1px solid #333;border-radius:10px;padding:16px 18px;cursor:pointer;transition:all 0.2s}
.index-card:hover{border-color:var(--accent);background:#222}
.index-card .idx-num{font-family:var(--font-mono);font-size:13px;color:#555;margin-bottom:6px}
.index-card .idx-label{font-size:12px;color:var(--accent);text-transform:uppercase;letter-spacing:0.08em;font-weight:600;margin-bottom:4px}
.index-card .idx-title{font-size:16px;color:#ddd;font-weight:500;line-height:1.3}
.audience-mode .nav-bar,.audience-mode .progress-bar{display:none!important}
.presenter-window .presenter-overlay{display:grid!important;grid-template-columns:2fr 1fr;grid-template-rows:auto 1fr auto;gap:16px;position:fixed;inset:0}
.presenter-window .presenter-overlay .presenter-nav{grid-column:1}

<div data-step="${s}">${qt}</div>
</div>${footer}</div>`;},

'starter-kit'(d,i){const stepOff=d.title?2:1;const q=d.quadrants.map((q,qi)=>{const items=q.items.map((item,ii)=>{const st=(q.first_mono&&ii===0)?` style="font-family:var(--font-mono);font-size:19px;color:${cv(q.color)}"`:'';return`<div${st}>${item}</div>`;}).join('');
return`<div data-step="${qi+stepOff}" class="card" style="border-top:4px solid ${cv(q.color)}"><div style="display:flex;align-items:center;gap:12px;margin-bottom:20px"><span style="font-family:var(--font-mono);font-size:19px;font-weight:700;color:${cv(q.color)};background:${cbg(q.color)};padding:4px 10px;border-radius:6px">${q.code}</span><span style="font-size:23px;font-weight:600">${q.name}</span></div><div style="display:flex;flex-direction:column;gap:10px;font-size:21px;color:var(--text2);line-height:1.6">${items}</div></div>`;}).join('');
const bigIdea=d.big_idea?`<h1 data-step="0" style="margin-top:14px;font-size:52px;color:var(--text)">${d.big_idea}</h1>`:'';
return`<div class="slide slide--light" data-slide="${i}" data-notes="${esc(d.notes)}">

${d.title?`<h2 data-step="1" style="margin-top:${d.big_idea?'28px':'14px'};font-size:21px;font-family:var(--font-body);font-weight:400;color:var(--text3)">${d.title}</h2>`:''}

'scaling-table'(d,i){const hd=d.columns.map(c=>`<th style="text-align:center">${c}</th>`).join('');

const slides=document.querySelectorAll('.slide');let current=0;const total=slides.length;let presenterOpen=false;let timerStart=null;let timerInterval=null;let currentStep=0;

function revealUpTo(el,step){
// First hide all output boxes
el.querySelectorAll('.term-output').forEach(e=>{e.style.display='none';e.style.opacity='0';});
// Process each data-step element
el.querySelectorAll('[data-step]').forEach(e=>{
const vis=parseInt(e.getAttribute('data-step'))<=step;
e.classList.toggle('visible',vis);
if(vis&&e.classList.contains('term-panel')&&!e.classList.contains('animating')){
e.classList.add('animating');
e.querySelectorAll('.anim-line').forEach(ln=>{const d=parseInt(ln.getAttribute('data-delay'))||0;setTimeout(()=>ln.classList.add('show'),d);});
}
if(!vis&&e.classList.contains('term-panel')){
e.classList.remove('animating');
e.querySelectorAll('.anim-line').forEach(ln=>ln.classList.remove('show'));
const typ=e.querySelector('.anim-type');
if(typ){const cl=typ.cloneNode(true);typ.parentNode.replaceChild(cl,typ);}
}
});
// Show output boxes for all revealed phases
for(let p=0;p<step;p++){
const ob=el.querySelector(`.term-output[data-phase="${p}"]`);
if(ob){ob.style.display='block';ob.style.opacity='1';ob.style.transform='translateY(0)';}
}
// Animate the current phase output box after terminal finishes
const currentPanel=el.querySelector(`.term-panel[data-phase="${step-1}"]`);
if(currentPanel&&currentPanel.classList.contains('animating')){
const maxDelay=Math.max(0,...[...currentPanel.querySelectorAll('.anim-line')].map(ln=>parseInt(ln.getAttribute('data-delay'))||0));
const ob=el.querySelector(`.term-output[data-phase="${step-1}"]`);
if(ob){ob.style.display='block';ob.style.opacity='0';ob.style.transform='translateY(6px)';
setTimeout(()=>{ob.style.transition='opacity .4s,transform .4s';ob.style.opacity='1';ob.style.transform='translateY(0)';},maxDelay+600);}
}
}
function showSlide(n,all){slides.forEach((s,i)=>{s.classList.remove('active','prev');s.querySelectorAll('[data-step]').forEach(e=>e.classList.remove('visible'));s.querySelectorAll('.term-output').forEach(e=>{e.style.display='none';e.style.opacity='0';});s.querySelectorAll('.term-panel').forEach(e=>{e.classList.remove('animating');e.querySelectorAll('.anim-line').forEach(ln=>ln.classList.remove('show'));});if(i<n)s.classList.add('prev');});slides[n].classList.add('active');current=n;currentStep=all?getMaxStep(slides[n]):0;revealUpTo(slides[n],currentStep);updateUI();}
function goForward(){const m=getMaxStep(slides[current]);if(currentStep<m){currentStep++;revealUpTo(slides[current],currentStep);updateUI();}else if(current<total-1)showSlide(current+1,false);}
function goBack(){if(currentStep>0){currentStep--;revealUpTo(slides[current],currentStep);updateUI();}else if(current>0)showSlide(current-1,true);}

function updatePresenter(){const c=slides[current];const t=c.querySelector('h1,h2');const lb=c.querySelector('.label');let sl=lb?lb.textContent:(t?t.textContent.substring(0,60):`Slide ${current+1}`);document.getElementById('presenterSlideLabel').innerHTML=`<div style="font-size:25px;color:#fff;font-weight:600">${sl}</div><div style="font-size:19px;color:#666;margin-top:4px">Slide ${current+1} of ${total}</div>`;const m=getMaxStep(slides[current]);let nx='';if(currentStep<m)nx=`<div style="font-size:16px;color:var(--accent)">Next click → reveal build ${currentStep+1}/${m}</div>`;else if(current<total-1){const n=slides[current+1];const nl=n.querySelector('.label');const nh=n.querySelector('h1,h2');let nla=nl?nl.textContent:(nh?nh.textContent.substring(0,50):`Slide ${current+2}`);nx=`<div style="font-size:16px;color:#aaa">Next: ${nla}</div>`;}else nx=`<div style="font-size:16px;color:#555">End of presentation</div>`;document.getElementById('presenterNextLabel').innerHTML=nx;document.getElementById('presenterNotesText').textContent=c.getAttribute('data-notes')||'No speaker notes.';const prev=document.getElementById('presenterSlidePreview');const clone=c.cloneNode(true);const vw=window.innerWidth;const vh=window.innerHeight;const pw=prev.offsetWidth||600;const ph=prev.offsetHeight||400;const scaleX=pw/vw;const scaleY=ph/vh;const scale=Math.min(scaleX,scaleY);clone.style.cssText=`position:absolute;top:0;left:0;width:${vw}px;height:${vh}px;opacity:1;visibility:visible;transform:scale(${scale});transform-origin:top left;pointer-events:none;overflow:hidden;`;clone.classList.add('active');clone.querySelectorAll('[data-step]').forEach(e=>{if(parseInt(e.getAttribute('data-step'))<=currentStep)e.classList.add('visible');});

// Show output boxes for revealed phases

}
function renderThumb(containerId,idx,showAll){const container=document.getElementById(containerId);container.innerHTML='';if(idx<0||idx>=total)return;const s=slides[idx];const cl=s.cloneNode(true);const vw=window.innerWidth;const vh=window.innerHeight;const pw=container.offsetWidth||300;const ph=container.offsetHeight||170;const scaleX=pw/vw;const scaleY=ph/vh;const sc=Math.min(scaleX,scaleY);cl.style.cssText=`position:absolute;top:0;left:0;width:${vw}px;height:${vh}px;opacity:1;visibility:visible;transform:scale(${sc});transform-origin:top left;pointer-events:none;overflow:hidden;`;cl.classList.add('active');const maxSt=showAll?getMaxStep(s):0;cl.querySelectorAll('[data-step]').forEach(e=>{if(parseInt(e.getAttribute('data-step'))<=maxSt)e.classList.add('visible');});cl.querySelectorAll('.anim-line').forEach(e=>{e.classList.add('show');e.style.opacity='1';e.style.transform='none';});cl.querySelectorAll('.anim-type').forEach(e=>{e.style.width='100%';e.style.borderRight='none';e.style.animation='none';});for(let p=0;p<maxSt;p++){const ob=cl.querySelector(`.term-output[data-phase="${p}"]`);if(ob){ob.style.display='block';ob.style.opacity='1';ob.style.transform='none';}}container.appendChild(cl);}
// === Dual-window presenter mode via BroadcastChannel ===
const channel=new BroadcastChannel('deck-sync');
const urlParams=new URLSearchParams(window.location.search);
const isPresenter=urlParams.get('role')==='presenter';
const isAudience=urlParams.get('role')==='audience';
let presenterWin=null;
let syncing=false;

function broadcastState(){if(!syncing)channel.postMessage({type:'sync',slide:current,step:currentStep});}
channel.onmessage=function(ev){
if(ev.data.type==='sync'){
syncing=true;
const n=ev.data.slide;const s=ev.data.step;
if(n!==current){showSlide(n,false);}
while(currentStep<s){currentStep++;revealUpTo(slides[current],currentStep);}
while(currentStep>s){currentStep--;revealUpTo(slides[current],currentStep);}
updateUI();
syncing=false;
}
};

// Wrap navigation to broadcast after each action
const _goFwd=goForward,_goBk=goBack,_shSlide=showSlide;
goForward=function(){_goFwd();broadcastState();};
goBack=function(){_goBk();broadcastState();};
showSlide=function(n,all){_shSlide(n,all);broadcastState();};

function togglePresenter(){

setTimeout(()=>broadcastState(),1000);
}

let touchStartX=0;document.addEventListener('touchstart',e=>{touchStartX=e.changedTouches[0].screenX;});document.addEventListener('touchend',e=>{const d=e.changedTouches[0].screenX-touchStartX;if(Math.abs(d)>50){d<0?goForward():goBack();}});
showSlide(0,false);

function toggleIndex(){const o=document.getElementById('indexOverlay');o.classList.toggle('open');}
function jumpToSlide(n){document.getElementById('indexOverlay').classList.remove('open');showSlide(n,false);}
(function buildIndex(){
const grid=document.getElementById('indexGrid');
slideData.forEach((d,i)=>{
  const card=document.createElement('div');card.className='index-card';card.onclick=()=>jumpToSlide(i);
  const label=d.label||'';
  let title=d.title||d.big_idea||d.title_line1||'';
  title=title.replace(/\n/g,' ').substring(0,60);
  if(d.type==='hero')title=d.title.substring(0,50);
  if(d.type==='custom')title='Process Flow';
  card.innerHTML=`<div class="idx-num">Slide ${i+1}</div>${label?`<div class="idx-label">${label}</div>`:''}<div class="idx-title">${title}</div>`;
  grid.appendChild(card);
});
})();
</script>
</body>
</html>
